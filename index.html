  s.kids = (s.kids || []).map(k => {
    if (!k.sections || !k.sections.length) {
      k.sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
    }
    return k;
  });
  // Migrate tasks: timeOfDay -> sectionName; no kidIds -> all kids
  s.tasks = (s.tasks || []).map(t => {
    if (!t.sectionName) {
      if (t.type === 'daily') t.sectionName = t.timeOfDay === 'evening' ? 'Evening' : 'Morning';
      else t.sectionName = 'Challenges';
    }
    if (!t.kidIds) t.kidIds = kidIds.slice();
    return t;
  });
  // Ensure every kid has all sectionNames referenced by their tasks
  s.kids.forEach(k => {
    const kidTaskSections = new Set(s.tasks.filter(t => (t.kidIds || []).includes(k.id)).map(t => t.sectionName));
    kidTaskSections.forEach(secName => {
      if (!k.sections.find(sec => sec.name === secName)) {
        k.sections.push({ id: 'sec_' + uid(), name: secName, icon: '✨', order: k.sections.length });
      }
    });
  });
  return s;
}

const SOUNDS = {
  task:       [{freq: 523}, {freq: 659}, {freq: 784, duration: 0.22}],
  page:       [{freq: 659}, {freq: 784}, {freq: 988, duration: 0.22}],
  milestone5: [{freq: 523}, {freq: 659}, {freq: 784}, {freq: 1047, duration: 0.35}],
  milestone10:[{freq: 523}, {freq: 659}, {freq: 784}, {freq: 1047}, {freq: 1319, duration: 0.5}],
  redeem:     [{freq: 880}, {freq: 1175}, {freq: 1568, duration: 0.3}],
  tap:        [{freq: 660, duration: 0.05}],
};
let _audioCtx = null;
function playSound(name, muted) {
  if (muted) return;
  try {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _audioCtx;
    if (ctx.state === 'suspended') ctx.resume();
    const notes = SOUNDS[name] || [];
    notes.forEach((n, i) => {
      const delay = n.delay != null ? n.delay : i * 85;
      setTimeout(() => {
        const now = ctx.currentTime;
        const dur = n.duration || 0.15;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = n.freq;
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.15, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(now); osc.stop(now + dur);
      }, delay);
    });
  } catch (e) { /* silent fail */ }
}

// ============= HELPERS =============
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
};
const weekKey = () => {
  const d = new Date();
  const onejan = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil((((d - onejan) / 86400000) + onejan.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${week}`;
};
const compKey = (kidId, task) => {
  if (task.type === 'daily') return `${kidId}_${task.id}_${todayKey()}`;
  if (task.type === 'weekly') return `${kidId}_${task.id}_${weekKey()}`;
  return `${kidId}_${task.id}`;
};
const randomMsg = (arr) => arr[Math.floor(Math.random() * arr.length)];
const uid = () => Math.random().toString(36).slice(2, 10);

// ============= CONFETTI / PARTICLES =============
function Confetti({ intensity = 'medium', trigger }) {
  const [particles, setParticles] = useState([]);
  useEffect(() => {
    if (!trigger) return;
    const count = intensity === 'huge' ? 60 : intensity === 'big' ? 35 : intensity === 'medium' ? 20 : 10;
    const emojis = intensity === 'huge'
      ? ['⭐', '✨', '🎉', '💫', '🌟', '💖', '👑', '🏆']
      : intensity === 'big'
      ? ['⭐', '✨', '🎉', '💫', '🌟', '🎖️']
      : ['⭐', '✨', '🎉', '💫', '🌟'];
    const newParticles = Array.from({ length: count }, (_, i) => ({
      id: `${Date.now()}-${i}`,
      emoji: emojis[Math.floor(Math.random() * emojis.length)],
      x: (Math.random() - 0.5) * 400,
      y: -Math.random() * 400 - 100,
      rot: (Math.random() - 0.5) * 720,
      delay: Math.random() * 0.2,
      size: 1 + Math.random() * 1.2,
    }));
    setParticles(newParticles);
    const t = setTimeout(() => setParticles([]), 1800);
    return () => clearTimeout(t);
  }, [trigger, intensity]);
  return (
    <div className="pointer-events-none fixed inset-0 z-50 flex items-center justify-center overflow-hidden">
      {particles.map(p => (
        <div
          key={p.id}
          style={{
            position: 'absolute',
            fontSize: `${2 * p.size}rem`,
            transform: `translate(0px, 0px)`,
            animation: `confettiFly 1.5s ease-out ${p.delay}s forwards`,
            ['--dx']: `${p.x}px`,
            ['--dy']: `${p.y}px`,
            ['--rot']: `${p.rot}deg`,
          }}
        >
          {p.emoji}
        </div>
      ))}
    </div>
  );
}

// ============= PARENT PIN =============
function ParentPin({ correctPin, onSuccess, onBack }) {
  const [pin, setPin] = useState('');
  const [wrong, setWrong] = useState(false);
  const tap = (n) => {
    if (pin.length >= 4) return;
    const next = pin + n;
    setPin(next);
    if (next.length === 4) {
      setTimeout(() => {
        if (next === correctPin) onSuccess();
        else { setWrong(true); setTimeout(() => { setPin(''); setWrong(false); }, 700); }
      }, 150);
    }
  };
  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6" style={{ background: C.bg }}>
      <button onClick={onBack} style={{ position: 'absolute', top: 20, left: 20, background: 'transparent', border: 'none', cursor: 'pointer', color: C.textSoft }}>

      <p style={{ color: C.textSoft, marginBottom: '8px', fontWeight: 600 }}>Default: 1234</p>
      <div style={{ display: 'flex', gap: '12px', marginBottom: '32px', animation: wrong ? 'shake 0.4s' : 'none' }}>
        {[0, 1, 2, 3].map(i => (
          <div key={i} style={{
            width: '18px', height: '18px', borderRadius: '50%',
            background: pin.length > i ? (wrong ? '#E04E6D' : C.primary) : 'transparent',
            border: `3px solid ${wrong ? '#E04E6D' : C.text}`,
          }} />
        ))}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 72px)', gap: '12px' }}>
        {[1, 2, 3, 4, 5, 6, 7, 8, 9, null, 0, 'del'].map((n, i) => (
          <button
            key={i}
            onClick={() => n === 'del' ? setPin(pin.slice(0, -1)) : n !== null && tap(String(n))}
            disabled={n === null}
            style={{
              height: '72px', borderRadius: '20px', border: 'none', cursor: n === null ? 'default' : 'pointer',

            }}
          >
            {n === 'del' ? '⌫' : n}
          </button>
        ))}
      </div>
    </div>
  );
}

          {kid.weeklyPoints} ⭐
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px' }}>
        {state.rewards.map(r => {
          const affordable = kid.weeklyPoints >= r.cost;
          const requested = justRequested === r.id;
          return (
            <button
              key={r.id}
              onClick={() => { if (affordable && !requested) { onRedeem(r); setJustRequested(r.id); setTimeout(() => setJustRequested(null), 2500); } }}
              disabled={!affordable || requested}
              style={{
                background: requested ? C.mint : C.card,
                border: `3px solid ${affordable ? C.sun : C.border}`,
                borderRadius: '20px',
                padding: '18px 10px',
                boxShadow: affordable ? `0 4px 0 ${C.border}` : 'none',
                opacity: affordable ? 1 : 0.5,
                cursor: affordable ? 'pointer' : 'default',
                display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '6px',
              }}
            >
              <div style={{ fontSize: '2.5rem' }}>{r.icon}</div>
              <div style={{ fontFamily: 'Fredoka, sans-serif', fontWeight: 700, color: C.text, fontSize: '0.95rem', textAlign: 'center', lineHeight: 1.2 }}>
                {r.name}
              </div>
              <div style={{
                background: affordable ? C.sun : '#E5E5E5', color: C.text,
                padding: '3px 10px', borderRadius: '999px', fontWeight: 800, fontSize: '0.85rem',
              }}>
                {requested ? '✓ Requested!' : `${r.cost} ⭐`}
              </div>
            </button>
          );
        })}
      </div>
      <p style={{ textAlign: 'center', color: C.textSoft, marginTop: '24px', fontWeight: 600, fontSize: '0.9rem' }}>
        Parents approve your requests ✨
      </p>
    </div>
  );
}

function ApprovalsTab({ state, setState }) {
  const pending = state.redemptions.filter(r => r.status === 'pending');
  const recent = state.redemptions.filter(r => r.status !== 'pending').slice(-5).reverse();
  const decide = (id, status) => setState(s => ({ ...s, redemptions: s.redemptions.map(r => r.id === id ? { ...r, status } : r) }));

  return (
    <div>
      <h3 style={{ fontFamily: 'Fredoka, sans-serif', color: C.text, marginBottom: '10px' }}>Pending requests</h3>
      {pending.length === 0 && <p style={{ color: C.textSoft, fontWeight: 600 }}>Nothing pending. 🎉</p>}
      {pending.map(r => {
        const kid = state.kids.find(k => k.id === r.kidId);
        const rew = state.rewards.find(x => x.id === r.rewardId);
        if (!kid || !rew) return null;
        return (
          <div key={r.id} style={{
            background: C.card, borderRadius: '18px', padding: '14px', marginBottom: '10px',
            display: 'flex', alignItems: 'center', gap: '12px', boxShadow: `0 3px 0 ${C.border}`,
          }}>
            <div style={{ fontSize: '2rem' }}>{rew.icon}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: 'Fredoka, sans-serif', fontWeight: 700, color: C.text }}>{rew.name}</div>
              <div style={{ fontSize: '0.85rem', color: C.textSoft, fontWeight: 600 }}>{kid.avatar} {kid.name} · {rew.cost} pts</div>
            </div>
            <button onClick={() => decide(r.id, 'approved')} style={{ background: C.mint, border: 'none', borderRadius: '999px', padding: '8px 14px', fontWeight: 800, color: C.text, cursor: 'pointer' }}>✓</button>
            <button onClick={() => decide(r.id, 'denied')} style={{ background: '#FFCBCB', border: 'none', borderRadius: '999px', padding: '8px 14px', fontWeight: 800, color: C.text, cursor: 'pointer' }}>✗</button>
          </div>
        );
      })}

      {recent.length > 0 && (
        <>
          <h3 style={{ fontFamily: 'Fredoka, sans-serif', color: C.text, marginTop: '24px', marginBottom: '10px' }}>Recent</h3>
          {recent.map(r => {
            const kid = state.kids.find(k => k.id === r.kidId);
            const rew = state.rewards.find(x => x.id === r.rewardId);
            if (!kid || !rew) return null;
            return (
              <div key={r.id} style={{ padding: '10px 14px', color: C.textSoft, fontWeight: 600, fontSize: '0.9rem' }}>
                {r.status === 'approved' ? '✅' : '❌'} {kid.name} — {rew.name}
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

function KidsTab({ state, setState }) {
  const [mode, setMode] = useState({ type: 'list' }); // {type:'list'} | {type:'add'} | {type:'edit', id}
  const [name, setName] = useState('');
  const [avatar, setAvatar] = useState(AVATARS[0]);
  const [color, setColor] = useState(KID_COLORS[2]);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [freshMenu, setFreshMenu] = useState(false);
  const [freshTypes, setFreshTypes] = useState({ daily: true, weekly: false, oneoff: false });
  const [confirmReset, setConfirmReset] = useState(false);

  const startAdd = () => { setName(''); setAvatar(AVATARS[0]); setColor(KID_COLORS[2]); setConfirmDelete(false); setFreshMenu(false); setConfirmReset(false); setMode({ type: 'add' }); };
  const startEdit = (k) => { setName(k.name); setAvatar(k.avatar); setColor(k.color); setConfirmDelete(false); setFreshMenu(false); setFreshTypes({ daily: true, weekly: false, oneoff: false }); setConfirmReset(false); setMode({ type: 'edit', id: k.id }); };
  const cancel = () => { setMode({ type: 'list' }); setConfirmDelete(false); setFreshMenu(false); setConfirmReset(false); };

  const save = () => {
    if (!name.trim()) return;
    if (mode.type === 'add') {
      setState(s => ({ ...s, kids: [...s.kids, { id: uid(), name: name.trim(), avatar, color, weeklyPoints: 0, lifetimePoints: 0, stickers: 0, sections: JSON.parse(JSON.stringify(DEFAULT_SECTIONS)) }] }));
    } else if (mode.type === 'edit') {
      setState(s => ({ ...s, kids: s.kids.map(k => k.id === mode.id ? { ...k, name: name.trim(), avatar, color } : k) }));
    }
    cancel();
  };

  const deleteKid = () => {
    setState(s => ({ ...s, kids: s.kids.filter(k => k.id !== mode.id) }));
    cancel();
  };

  // Start a fresh day/week: uncheck selected task types for this kid but KEEP all points earned.
  // No refund — the kid keeps what they earned, only the checkmarks go away.
  const startFresh = () => {
    const kidId = mode.id;
    const selected = Object.keys(freshTypes).filter(t => freshTypes[t]);
    if (selected.length === 0) return;
    setState(s => {
      const newCompletions = { ...s.completions };
      Object.keys(newCompletions).forEach(key => {
        if (!key.startsWith(kidId + '_')) return;
        const rest = key.slice(kidId.length + 1);
        const parts = rest.split('_');
        const taskId = parts[0];
        const task = s.tasks.find(t => t.id === taskId);
        if (!task) return;
        // Map task type to completion-key shape:
        // daily -> key ends with _YYYY-MM-DD, weekly -> _YYYY-Wn, oneoff -> no suffix
        const type = task.type;
        if (!selected.includes(type)) return;
        delete newCompletions[key];
      });
      return { ...s, completions: newCompletions };
    });
    cancel();
  };

  // Full reset for one kid: wipe points, stickers, all completions, homework pages, and their pending redemptions.
  const resetKid = () => {
    const kidId = mode.id;
    setState(s => {
      const newCompletions = Object.fromEntries(Object.entries(s.completions).filter(([k]) => !k.startsWith(kidId + '_')));
      const newHomeworkPages = Object.fromEntries(Object.entries(s.homeworkPages).filter(([k]) => !k.startsWith(kidId + '_')));
      const kids = s.kids.map(k => k.id === kidId ? { ...k, weeklyPoints: 0, lifetimePoints: 0, stickers: 0 } : k);
      const redemptions = s.redemptions.filter(r => r.kidId !== kidId);
      return { ...s, completions: newCompletions, homeworkPages: newHomeworkPages, kids, redemptions };
    });
    cancel();
  };

  const currentKid = mode.type === 'edit' ? state.kids.find(k => k.id === mode.id) : null;

  // Count tasks by type that this kid currently has completions for (so the menu can show counts).
  const freshCounts = (() => {
    if (!currentKid) return { daily: 0, weekly: 0, oneoff: 0 };
    const counts = { daily: 0, weekly: 0, oneoff: 0 };
    Object.keys(state.completions).forEach(key => {
      if (!key.startsWith(currentKid.id + '_')) return;
      const rest = key.slice(currentKid.id.length + 1);
      const taskId = rest.split('_')[0];
      const task = state.tasks.find(t => t.id === taskId);
      if (task && counts[task.type] != null) counts[task.type]++;
    });
    return counts;
  })();

  const renderForm = (isEdit) => (
    <div style={{ background: C.card, borderRadius: '18px', padding: '16px', marginBottom: '10px', boxShadow: `0 3px 0 ${C.border}` }}>
      <div style={{ marginBottom: '8px', fontWeight: 700, color: C.text, fontSize: '0.85rem' }}>Name</div>
      <input value={name} onChange={e => setName(e.target.value)} placeholder="Name" style={{ width: '100%', padding: '10px 14px', borderRadius: '12px', border: `2px solid ${C.border}`, fontSize: '1rem', marginBottom: '12px', fontFamily: 'inherit', boxSizing: 'border-box' }} />
      <div style={{ marginBottom: '8px', fontWeight: 700, color: C.text, fontSize: '0.85rem' }}>Avatar</div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px', marginBottom: '12px' }}>
        {AVATARS.map(a => (
          <button key={a} onClick={() => setAvatar(a)} style={{ fontSize: '1.75rem', padding: '4px 8px', borderRadius: '12px', border: avatar === a ? `3px solid ${C.primary}` : '3px solid transparent', background: avatar === a ? C.bgSoft : 'transparent', cursor: 'pointer' }}>{a}</button>
        ))}
      </div>
      <div style={{ marginBottom: '8px', fontWeight: 700, color: C.text, fontSize: '0.85rem' }}>Color</div>
      <div style={{ display: 'flex', gap: '8px', marginBottom: '14px' }}>
        {KID_COLORS.map(c => (
          <button key={c} onClick={() => setColor(c)} style={{ width: '36px', height: '36px', borderRadius: '50%', background: c, border: color === c ? `3px solid ${C.text}` : '3px solid transparent', cursor: 'pointer' }} />
        ))}
      </div>

      {/* Today's completions — individual undo */}
      {isEdit && currentKid && (() => {
        const today = todayKey();
        const doneToday = Object.keys(state.completions)
          .filter(k => k.startsWith(currentKid.id + '_') && k.endsWith('_' + today))
          .map(k => {
            const taskId = k.slice(currentKid.id.length + 1, k.length - today.length - 1);
            const task = state.tasks.find(t => t.id === taskId);
            return task ? { key: k, task } : null;
          })
          .filter(Boolean);
        if (doneToday.length === 0) return null;
        const undoOne = (key, task) => {
          const refund = (task.points || 0) + (task.bonus || 0);
          setState(s => {
            const newCompletions = { ...s.completions };
            delete newCompletions[key];
            const kids = s.kids.map(k => k.id === currentKid.id
              ? { ...k, weeklyPoints: Math.max(0, k.weeklyPoints - refund), lifetimePoints: Math.max(0, k.lifetimePoints - refund) }
              : k);
            return { ...s, completions: newCompletions, kids };
          });
        };
        return (
          <div style={{ borderTop: `2px dashed ${C.border}`, paddingTop: '12px', marginBottom: '12px' }}>
            <div style={{ fontSize: '0.75rem', color: C.textSoft, fontWeight: 700, marginBottom: '8px', textTransform: 'uppercase', letterSpacing: '0.5px' }}>
              Today's completions ({doneToday.length})
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
              {doneToday.map(({ key, task }) => (
                <div key={key} style={{ background: C.bgSoft, borderRadius: '12px', padding: '8px 12px', display: 'flex', alignItems: 'center', gap: '10px' }}>
                  <div style={{ fontSize: '1.3rem' }}>{task.icon}</div>
                  <div style={{ flex: 1, fontWeight: 700, color: C.text, fontSize: '0.9rem' }}>{task.name}</div>
                  <div style={{ color: C.textSoft, fontSize: '0.75rem', fontWeight: 700 }}>+{(task.points || 0) + (task.bonus || 0)}</div>
                  <button onClick={() => undoOne(key, task)} style={{ background: C.card, border: 'none', borderRadius: '50%', width: '28px', height: '28px', cursor: 'pointer', color: '#E04E6D', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <X size={16} strokeWidth={3} />
                  </button>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Destructive actions (edit mode only) */}
      {isEdit && !confirmDelete && !freshMenu && !confirmReset && (
        <div style={{ borderTop: `2px dashed ${C.border}`, paddingTop: '12px', marginBottom: '12px' }}>
          <div style={{ fontSize: '0.75rem', color: C.textSoft, fontWeight: 700, marginBottom: '8px', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Reset options</div>
          <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
            <button onClick={() => setFreshMenu(true)} style={{ flex: 1, minWidth: '120px', background: '#E7F4FF', color: '#2564A8', border: 'none', padding: '10px 12px', borderRadius: '12px', fontWeight: 700, cursor: 'pointer', fontSize: '0.85rem' }}>
              Start fresh day
            </button>
            <button onClick={() => setConfirmReset(true)} style={{ flex: 1, minWidth: '120px', background: '#FFE5E5', color: '#E04E6D', border: 'none', padding: '10px 12px', borderRadius: '12px', fontWeight: 700, cursor: 'pointer', fontSize: '0.85rem' }}>
              Fix points (reset to 0)
            </button>
          </div>
        </div>
      )}

      {isEdit && freshMenu && (
        <div style={{ background: '#E7F4FF', borderRadius: '12px', padding: '14px', marginBottom: '12px' }}>
          <div style={{ fontWeight: 700, color: C.text, marginBottom: '4px', fontSize: '0.95rem' }}>Start fresh — which tasks?</div>
          <div style={{ color: C.textSoft, fontSize: '0.8rem', fontWeight: 600, marginBottom: '12px' }}>
            Uncheck selected task types so {currentKid?.name || 'the kid'} can do them again. Points already earned stay.
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '6px', marginBottom: '12px' }}>
            {[
              { key: 'daily',  label: 'Daily tasks',   desc: 'Morning, evening, every-day routines' },
              { key: 'weekly', label: 'Weekly tasks',  desc: 'Things done once per week' },
              { key: 'oneoff', label: 'One-off tasks', desc: 'Things completed just once (e.g. try a new food)' },
            ].map(({ key, label, desc }) => {
              const count = freshCounts[key] || 0;
              const on = freshTypes[key];
              return (
                <button
                  key={key}
                  onClick={() => setFreshTypes(t => ({ ...t, [key]: !t[key] }))}
                  style={{
                    background: on ? C.card : 'rgba(255,255,255,0.5)',
                    border: on ? `3px solid ${C.sky}` : `3px solid transparent`,
                    borderRadius: '12px',
                    padding: '10px 12px',
                    display: 'flex',
                    alignItems: 'center',
                    gap: '10px',
                    cursor: 'pointer',
                    textAlign: 'left',
                  }}
                >
                  <div style={{
                    width: '22px', height: '22px', borderRadius: '6px',
                    background: on ? C.sky : '#FFF',
                    border: `2px solid ${on ? C.sky : '#C9D6E0'}`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                  }}>
                    {on && <Check size={14} color="#fff" strokeWidth={3} />}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, color: C.text, fontSize: '0.9rem' }}>{label}</div>
                    <div style={{ color: C.textSoft, fontSize: '0.75rem', fontWeight: 600 }}>{desc}</div>
                  </div>
                  <div style={{ color: C.textSoft, fontSize: '0.85rem', fontWeight: 700 }}>
                    {count} checked
                  </div>
                </button>
              );
            })}
          </div>
          <div style={{ display: 'flex', gap: '8px' }}>
            <button
              onClick={startFresh}
              disabled={!Object.values(freshTypes).some(Boolean)}
              style={{
                flex: 1,
                background: Object.values(freshTypes).some(Boolean) ? C.sky : '#CCC',
                color: '#fff', border: 'none', padding: '12px', borderRadius: '12px', fontWeight: 800,
                cursor: Object.values(freshTypes).some(Boolean) ? 'pointer' : 'default',
              }}
            >
              Uncheck selected
            </button>
            <button onClick={() => setFreshMenu(false)} style={{ background: '#EEE', border: 'none', padding: '12px 16px', borderRadius: '12px', fontWeight: 700, cursor: 'pointer' }}>Cancel</button>
          </div>
        </div>
      )}

      {isEdit && confirmReset && (
        <div style={{ background: '#FFE5E5', borderRadius: '12px', padding: '12px', textAlign: 'center', marginBottom: '12px' }}>
          <div style={{ fontWeight: 700, color: C.text, marginBottom: '10px', fontSize: '0.9rem' }}>
            Fix points: reset {currentKid?.name || 'this kid'} to 0? Weekly points, lifetime points, stickers, and all completion history will be erased. Use this only for mistakes. Tasks and sections are kept.
          </div>
          <div style={{ display: 'flex', gap: '8px' }}>
            <button onClick={resetKid} style={{ flex: 1, background: '#E04E6D', color: '#fff', border: 'none', padding: '10px', borderRadius: '12px', fontWeight: 800, cursor: 'pointer' }}>Yes, reset to 0</button>
            <button onClick={() => setConfirmReset(false)} style={{ flex: 1, background: '#EEE', border: 'none', padding: '10px', borderRadius: '12px', fontWeight: 700, cursor: 'pointer' }}>Cancel</button>
          </div>
        </div>
      )}

      {isEdit && confirmDelete ? (
        <div style={{ background: '#FFE5E5', borderRadius: '12px', padding: '12px', textAlign: 'center' }}>
          <div style={{ fontWeight: 700, color: C.text, marginBottom: '10px', fontSize: '0.9rem' }}>Remove this kid? Points will be lost.</div>
          <div style={{ display: 'flex', gap: '8px' }}>
            <button onClick={deleteKid} style={{ flex: 1, background: '#E04E6D', color: '#fff', border: 'none', padding: '10px', borderRadius: '12px', fontWeight: 800, cursor: 'pointer' }}>Yes, remove</button>
            <button onClick={() => setConfirmDelete(false)} style={{ flex: 1, background: '#EEE', border: 'none', padding: '10px', borderRadius: '12px', fontWeight: 700, cursor: 'pointer' }}>Keep</button>
          </div>
        </div>
      ) : (
        <div style={{ display: 'flex', gap: '8px' }}>
          <button onClick={save} style={{ flex: 1, background: C.primary, color: '#fff', border: 'none', padding: '12px', borderRadius: '14px', fontWeight: 800, cursor: 'pointer' }}>{isEdit ? 'Save' : 'Add kid'}</button>
          {isEdit && <button onClick={() => setConfirmDelete(true)} style={{ background: '#FFE5E5', color: '#E04E6D', border: 'none', padding: '12px 14px', borderRadius: '14px', fontWeight: 800, cursor: 'pointer' }}>Delete</button>}
          <button onClick={cancel} style={{ background: '#EEE', border: 'none', padding: '12px 14px', borderRadius: '14px', fontWeight: 700, cursor: 'pointer' }}>Cancel</button>
        </div>
      )}
    </div>
  );

  return (
    <div>
      {state.kids.map(k => mode.type === 'edit' && mode.id === k.id ? (
        <React.Fragment key={k.id}>{renderForm(true)}</React.Fragment>
      ) : (
        <button
          key={k.id}
          onClick={() => startEdit(k)}
          style={{ background: C.card, borderRadius: '18px', padding: '14px', marginBottom: '10px', display: 'flex', alignItems: 'center', gap: '12px', borderLeft: `6px solid ${k.color}`, width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer', boxShadow: `0 3px 0 ${C.border}` }}
        >
          <div style={{ fontSize: '2.25rem' }}>{k.avatar}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: 'Fredoka, sans-serif', fontWeight: 700, color: C.text, fontSize: '1.1rem' }}>{k.name}</div>
            <div style={{ color: C.textSoft, fontWeight: 600, fontSize: '0.85rem' }}>{k.weeklyPoints} this week · {k.lifetimePoints} total · {k.stickers} 🏅</div>
          </div>
          <div style={{ color: C.textSoft, fontSize: '0.75rem', fontWeight: 700 }}>tap to edit</div>
        </button>
      ))}
      {mode.type === 'add' ? (
        renderForm(false)
      ) : (
        <button onClick={startAdd} style={{ width: '100%', background: 'transparent', border: `3px dashed ${C.textSoft}`, borderRadius: '18px', padding: '16px', color: C.text, fontFamily: 'Fredoka, sans-serif', fontWeight: 700, fontSize: '1rem', cursor: 'pointer', marginTop: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px' }}>
          <UserPlus size={20} /> Add kid
        </button>
      )}
    </div>
  );
}

function TasksTab({ state, setState }) {
  const [mode, setMode] = useState({ type: 'list' });
  const [name, setName] = useState('');
  const [icon, setIcon] = useState('✨');
  const [type, setType] = useState('daily');
  const [sectionName, setSectionName] = useState('Morning');
  const [points, setPoints] = useState(10);
  const [bonus, setBonus] = useState(0);
  const [kidIds, setKidIds] = useState(state.kids.map(k => k.id));
  const [confirmDelete, setConfirmDelete] = useState(false);

  // Union of every section name used by any kid — so parents can pick any existing section
  const allSectionNames = Array.from(new Set(
    state.kids.flatMap(k => (k.sections || []).map(s => s.name))
  ));
  if (allSectionNames.length === 0) allSectionNames.push('Morning', 'Evening', 'Challenges');

  const startAdd = () => {
    setName(''); setIcon('✨'); setType('daily');
    setSectionName(allSectionNames[0] || 'Morning');
    setPoints(10); setBonus(0);
    setKidIds(state.kids.map(k => k.id));
    setConfirmDelete(false);
    setMode({ type: 'add' });
  };
  const startEdit = (t) => {
    setName(t.name); setIcon(t.icon); setType(t.type);
    setSectionName(t.sectionName || 'Morning');
    setPoints(t.points); setBonus(t.bonus || 0);
    setKidIds((t.kidIds || []).slice());
    setConfirmDelete(false);
    setMode({ type: 'edit', id: t.id });
  };
  const cancel = () => { setMode({ type: 'list' }); setConfirmDelete(false); };

  const save = () => {
    if (!name.trim() || !kidIds.length) return;
    const data = {
      name: name.trim(), icon, type,
      sectionName,
      points: Number(points), bonus: Number(bonus),
      kidIds: kidIds.slice(),
    };
    setState(s => {
      // Ensure every assigned kid has this section (auto-create if missing)
      const kids = s.kids.map(k => {
        if (!kidIds.includes(k.id)) return k;
        if ((k.sections || []).find(sec => sec.name === sectionName)) return k;
        return { ...k, sections: [...(k.sections || []), { id: 'sec_' + uid(), name: sectionName, icon: '✨', order: (k.sections || []).length }] };
      });
      let tasks;
      if (mode.type === 'add') tasks = [...s.tasks, { id: uid(), ...data }];
      else tasks = s.tasks.map(t => t.id === mode.id ? { ...t, ...data } : t);
      return { ...s, kids, tasks };
    });
    cancel();
  };

  const deleteTask = () => {
    setState(s => ({ ...s, tasks: s.tasks.filter(t => t.id !== mode.id) }));
    cancel();
  };

  const toggleKid = (id) => {
    setKidIds(curr => curr.includes(id) ? curr.filter(x => x !== id) : [...curr, id]);
  };

  const renderForm = (isEdit) => (
    <div style={{ background: C.card, borderRadius: '18px', padding: '16px', marginBottom: '10px', boxShadow: `0 3px 0 ${C.border}` }}>
      <input value={name} onChange={e => setName(e.target.value)} placeholder="Task name" style={{ width: '100%', padding: '10px 14px', borderRadius: '12px', border: `2px solid ${C.border}`, fontSize: '1rem', marginBottom: '10px', fontFamily: 'inherit', boxSizing: 'border-box' }} />
      <input value={icon} onChange={e => setIcon(e.target.value)} placeholder="Icon (emoji)" style={{ width: '100%', padding: '10px 14px', borderRadius: '12px', border: `2px solid ${C.border}`, fontSize: '1rem', marginBottom: '12px', fontFamily: 'inherit', boxSizing: 'border-box' }} />

      <div style={{ fontSize: '0.8rem', color: C.textSoft, fontWeight: 700, marginBottom: '6px' }}>For which kids?</div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px', marginBottom: '12px' }}>
        {state.kids.map(k => {
          const on = kidIds.includes(k.id);
          return (
            <button key={k.id} onClick={() => toggleKid(k.id)} style={{ padding: '6px 12px', borderRadius: '999px', border: 'none', background: on ? k.color : C.bgSoft, color: on ? '#fff' : C.text, fontWeight: 700, cursor: 'pointer', fontSize: '0.85rem', display: 'flex', alignItems: 'center', gap: '6px' }}>
              {on && <Check size={14} color="#fff" strokeWidth={3} />} {k.avatar} {k.name}
            </button>
          );
        })}
      </div>

      <div style={{ fontSize: '0.8rem', color: C.textSoft, fontWeight: 700, marginBottom: '6px' }}>Type</div>
      <div style={{ display: 'flex', gap: '6px', marginBottom: '12px' }}>
        {['daily', 'weekly', 'oneoff'].map(tt => (
          <button key={tt} onClick={() => setType(tt)} style={{ flex: 1, padding: '8px', borderRadius: '10px', border: 'none', background: type === tt ? C.primary : C.bgSoft, color: type === tt ? '#fff' : C.text, fontWeight: 700, cursor: 'pointer', textTransform: 'capitalize' }}>
            {tt === 'oneoff' ? 'one-off' : tt}
          </button>
        ))}
      </div>

      <div style={{ fontSize: '0.8rem', color: C.textSoft, fontWeight: 700, marginBottom: '6px' }}>Section</div>
      <select value={sectionName} onChange={e => setSectionName(e.target.value)} style={{ width: '100%', padding: '10px 14px', borderRadius: '12px', border: `2px solid ${C.border}`, fontSize: '1rem', marginBottom: '12px', fontFamily: 'inherit', boxSizing: 'border-box', background: C.card, color: C.text }}>
        {allSectionNames.map(n => <option key={n} value={n}>{n}</option>)}
      </select>
      <p style={{ fontSize: '0.75rem', color: C.textSoft, marginTop: '-6px', marginBottom: '12px', fontWeight: 600 }}>Tip: add or rename sections in the Sections tab.</p>

      <div style={{ display: 'flex', gap: '8px', marginBottom: '14px' }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: '0.8rem', color: C.textSoft, fontWeight: 700, marginBottom: '4px' }}>Points</div>
          <input type="number" value={points} onChange={e => setPoints(e.target.value)} style={{ width: '100%', padding: '10px', borderRadius: '10px', border: `2px solid ${C.border}`, fontFamily: 'inherit', boxSizing: 'border-box' }} />
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: '0.8rem', color: C.textSoft, fontWeight: 700, marginBottom: '4px' }}>Bonus</div>
          <input type="number" value={bonus} onChange={e => setBonus(e.target.value)} style={{ width: '100%', padding: '10px', borderRadius: '10px', border: `2px solid ${C.border}`, fontFamily: 'inherit', boxSizing: 'border-box' }} />
        </div>
      </div>
      {isEdit && confirmDelete ? (
        <div style={{ background: '#FFE5E5', borderRadius: '12px', padding: '12px', textAlign: 'center' }}>
          <div style={{ fontWeight: 700, color: C.text, marginBottom: '10px', fontSize: '0.9rem' }}>Remove this task?</div>
          <div style={{ display: 'flex', gap: '8px' }}>
            <button onClick={deleteTask} style={{ flex: 1, background: '#E04E6D', color: '#fff', border: 'none', padding: '10px', borderRadius: '12px', fontWeight: 800, cursor: 'pointer' }}>Yes, remove</button>
            <button onClick={() => setConfirmDelete(false)} style={{ flex: 1, background: '#EEE', border: 'none', padding: '10px', borderRadius: '12px', fontWeight: 700, cursor: 'pointer' }}>Keep</button>
          </div>
        </div>
      ) : (
        <div style={{ display: 'flex', gap: '8px' }}>
          <button onClick={save} style={{ flex: 1, background: C.primary, color: '#fff', border: 'none', padding: '12px', borderRadius: '14px', fontWeight: 800, cursor: 'pointer' }}>{isEdit ? 'Save' : 'Add task'}</button>
          {isEdit && <button onClick={() => setConfirmDelete(true)} style={{ background: '#FFE5E5', color: '#E04E6D', border: 'none', padding: '12px 14px', borderRadius: '14px', fontWeight: 800, cursor: 'pointer' }}>Delete</button>}
          <button onClick={cancel} style={{ background: '#EEE', border: 'none', padding: '12px 14px', borderRadius: '14px', fontWeight: 700, cursor: 'pointer' }}>Cancel</button>
        </div>
      )}
    </div>
  );

  // Group tasks by section name — show a group for every section used by any kid
  const groups = allSectionNames.map(sn => ({
    label: sn,
    items: state.tasks.filter(t => t.sectionName === sn),
  })).filter(g => g.items.length > 0);

  const kidSummary = (task) => {
    const names = (task.kidIds || []).map(id => {
      const k = state.kids.find(x => x.id === id);
      return k ? k.avatar : '';
    }).filter(Boolean).join(' ');
    return names || '—';
  };

  return (
    <div>
      {groups.map(g => (
        <div key={g.label} style={{ marginBottom: '16px' }}>
          <h3 style={{ fontFamily: 'Fredoka, sans-serif', color: C.text, marginBottom: '8px', fontSize: '1.05rem' }}>{g.label}</h3>
          {g.items.map(t => mode.type === 'edit' && mode.id === t.id ? (
            <React.Fragment key={t.id}>{renderForm(true)}</React.Fragment>
          ) : (
            <button
              key={t.id}
              onClick={() => startEdit(t)}
              style={{ background: C.card, borderRadius: '14px', padding: '10px 14px', marginBottom: '6px', display: 'flex', alignItems: 'center', gap: '10px', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer', boxShadow: `0 2px 0 ${C.border}` }}
            >
              <div style={{ fontSize: '1.5rem' }}>{t.icon}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, color: C.text, fontSize: '0.95rem' }}>{t.name}</div>
                <div style={{ color: C.textSoft, fontSize: '0.8rem', fontWeight: 600 }}>
                  {t.points} pts{t.bonus > 0 ? ` +${t.bonus} bonus` : ''} · {t.type} · {kidSummary(t)}
                </div>
              </div>
              <div style={{ color: C.textSoft, fontSize: '0.7rem', fontWeight: 700 }}>tap to edit</div>
            </button>
          ))}
        </div>
      ))}
      {mode.type === 'add' ? (
        renderForm(false)
      ) : (
        <button onClick={startAdd} style={{ width: '100%', background: 'transparent', border: `3px dashed ${C.textSoft}`, borderRadius: '18px', padding: '16px', color: C.text, fontFamily: 'Fredoka, sans-serif', fontWeight: 700, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px' }}>
          <Plus size={20} /> Add task
        </button>
      )}
    </div>
  );
}

function SectionsTab({ state, setState }) {
  const [selectedKidId, setSelectedKidId] = useState(state.kids[0]?.id || null);
  const [mode, setMode] = useState({ type: 'list' }); // list | add | edit
  const [secName, setSecName] = useState('');
  const [secIcon, setSecIcon] = useState('✨');
  const [confirmDelete, setConfirmDelete] = useState(false);

  const kid = state.kids.find(k => k.id === selectedKidId);
  if (!kid) return <p style={{ color: C.textSoft, fontWeight: 600 }}>Add a kid first in the Kids tab.</p>;
  const sections = (kid.sections || []).slice().sort((a, b) => (a.order || 0) - (b.order || 0));

  const startAdd = () => { setSecName(''); setSecIcon('✨'); setConfirmDelete(false); setMode({ type: 'add' }); };
  const startEdit = (sec) => { setSecName(sec.name); setSecIcon(sec.icon || '✨'); setConfirmDelete(false); setMode({ type: 'edit', id: sec.id }); };
  const cancel = () => { setMode({ type: 'list' }); setConfirmDelete(false); };

  const saveSection = () => {
    if (!secName.trim()) return;
    const trimmed = secName.trim();
    setState(s => {
      const kids = s.kids.map(k => {
        if (k.id !== selectedKidId) return k;
        let sections = k.sections || [];
        if (mode.type === 'add') {
          // Prevent duplicate names on the same kid
          if (sections.find(sec => sec.name.toLowerCase() === trimmed.toLowerCase())) return k;
          sections = [...sections, { id: 'sec_' + uid(), name: trimmed, icon: secIcon, order: sections.length }];
        } else if (mode.type === 'edit') {
          const oldSection = sections.find(sec => sec.id === mode.id);
          const oldName = oldSection?.name;
          sections = sections.map(sec => sec.id === mode.id ? { ...sec, name: trimmed, icon: secIcon } : sec);
          // If the name changed, also rename it in every task that was assigned to this kid
          if (oldName && oldName !== trimmed) {
            // Handle task rename in a separate pass
            return { ...k, sections, __renamedFrom: oldName, __renamedTo: trimmed };
          }
        }
        return { ...k, sections };
      });
      let tasks = s.tasks;
      // If a rename happened, propagate to tasks that apply to this kid
      const renamer = kids.find(k => k.__renamedFrom);
      if (renamer) {
        tasks = tasks.map(t => {
          if (!(t.kidIds || []).includes(renamer.id)) return t;
          if (t.sectionName !== renamer.__renamedFrom) return t;
          return { ...t, sectionName: renamer.__renamedTo };
        });
        // Clean up the markers
        kids.forEach(k => { delete k.__renamedFrom; delete k.__renamedTo; });
      }
      return { ...s, kids, tasks };
    });
    cancel();
  };

  const deleteSection = () => {
    const sec = sections.find(x => x.id === mode.id);
    if (!sec) return;
    setState(s => {
      // Remove this section from this kid only
      const kids = s.kids.map(k => k.id === selectedKidId ? { ...k, sections: (k.sections || []).filter(x => x.id !== mode.id) } : k);
      // For tasks assigned to this kid whose section is the one being deleted: unassign this kid from them.
      // If a task ends up with no kids, drop it.
      const tasks = s.tasks.map(t => {
        if (t.sectionName !== sec.name) return t;
        if (!(t.kidIds || []).includes(selectedKidId)) return t;
        return { ...t, kidIds: (t.kidIds || []).filter(id => id !== selectedKidId) };
      }).filter(t => (t.kidIds || []).length > 0);
      return { ...s, kids, tasks };
    });
    cancel();
  };

  const renderForm = (isEdit) => (
    <div style={{ background: C.card, borderRadius: '18px', padding: '16px', marginBottom: '10px', boxShadow: `0 3px 0 ${C.border}` }}>
      <div style={{ fontSize: '0.8rem', color: C.textSoft, fontWeight: 700, marginBottom: '6px' }}>Section name</div>
      <input value={secName} onChange={e => setSecName(e.target.value)} placeholder="e.g. After school" style={{ width: '100%', padding: '10px 14px', borderRadius: '12px', border: `2px solid ${C.border}`, fontSize: '1rem', marginBottom: '10px', fontFamily: 'inherit', boxSizing: 'border-box' }} />
      <div style={{ fontSize: '0.8rem', color: C.textSoft, fontWeight: 700, marginBottom: '6px' }}>Icon (emoji)</div>
      <input value={secIcon} onChange={e => setSecIcon(e.target.value)} placeholder="✨" style={{ width: '100%', padding: '10px 14px', borderRadius: '12px', border: `2px solid ${C.border}`, fontSize: '1rem', marginBottom: '14px', fontFamily: 'inherit', boxSizing: 'border-box' }} />
      {isEdit && confirmDelete ? (
        <div style={{ background: '#FFE5E5', borderRadius: '12px', padding: '12px', textAlign: 'center' }}>
          <div style={{ fontWeight: 700, color: C.text, marginBottom: '10px', fontSize: '0.9rem' }}>Remove this section from {kid.name}? Tasks only for {kid.name} in this section will be removed too.</div>
          <div style={{ display: 'flex', gap: '8px' }}>
            <button onClick={deleteSection} style={{ flex: 1, background: '#E04E6D', color: '#fff', border: 'none', padding: '10px', borderRadius: '12px', fontWeight: 800, cursor: 'pointer' }}>Yes, remove</button>
            <button onClick={() => setConfirmDelete(false)} style={{ flex: 1, background: '#EEE', border: 'none', padding: '10px', borderRadius: '12px', fontWeight: 700, cursor: 'pointer' }}>Keep</button>
          </div>
        </div>
      ) : (
        <div style={{ display: 'flex', gap: '8px' }}>
          <button onClick={saveSection} style={{ flex: 1, background: C.primary, color: '#fff', border: 'none', padding: '12px', borderRadius: '14px', fontWeight: 800, cursor: 'pointer' }}>{isEdit ? 'Save' : 'Add section'}</button>
          {isEdit && <button onClick={() => setConfirmDelete(true)} style={{ background: '#FFE5E5', color: '#E04E6D', border: 'none', padding: '12px 14px', borderRadius: '14px', fontWeight: 800, cursor: 'pointer' }}>Delete</button>}
          <button onClick={cancel} style={{ background: '#EEE', border: 'none', padding: '12px 14px', borderRadius: '14px', fontWeight: 700, cursor: 'pointer' }}>Cancel</button>
        </div>
      )}
    </div>
  );

  return (
    <div>
      <div style={{ fontSize: '0.8rem', color: C.textSoft, fontWeight: 700, marginBottom: '6px' }}>Choose a kid</div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px', marginBottom: '16px' }}>
        {state.kids.map(k => (
          <button
            key={k.id}
            onClick={() => { setSelectedKidId(k.id); cancel(); }}
            style={{ padding: '6px 12px', borderRadius: '999px', border: 'none', background: selectedKidId === k.id ? k.color : C.bgSoft, color: selectedKidId === k.id ? '#fff' : C.text, fontWeight: 700, cursor: 'pointer', fontSize: '0.9rem' }}
          >
            {k.avatar} {k.name}
          </button>
        ))}
      </div>

      {sections.map(sec => mode.type === 'edit' && mode.id === sec.id ? (
        <React.Fragment key={sec.id}>{renderForm(true)}</React.Fragment>
      ) : (
        <button
          key={sec.id}
          onClick={() => startEdit(sec)}
          style={{ background: C.card, borderRadius: '14px', padding: '12px 14px', marginBottom: '6px', display: 'flex', alignItems: 'center', gap: '10px', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer', boxShadow: `0 2px 0 ${C.border}` }}
        >
          <div style={{ fontSize: '1.5rem' }}>{sec.icon || '✨'}</div>
          <div style={{ flex: 1, fontWeight: 700, color: C.text }}>{sec.name}</div>
          <div style={{ color: C.textSoft, fontSize: '0.7rem', fontWeight: 700 }}>tap to edit</div>
        </button>
      ))}

      {mode.type === 'add' ? (
        renderForm(false)
      ) : (
        <button onClick={startAdd} style={{ width: '100%', background: 'transparent', border: `3px dashed ${C.textSoft}`, borderRadius: '18px', padding: '16px', color: C.text, fontFamily: 'Fredoka, sans-serif', fontWeight: 700, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px', marginTop: '8px' }}>
          <Plus size={20} /> Add section for {kid.name}
        </button>
      )}
    </div>
  );
}

function RewardsTab({ state, setState }) {
  const [mode, setMode] = useState({ type: 'list' }); // list | add | edit
  const [name, setName] = useState('');
  const [icon, setIcon] = useState('🎁');
  const [cost, setCost] = useState(50);
  const [confirmDelete, setConfirmDelete] = useState(false);

  const startAdd = () => { setName(''); setIcon('🎁'); setCost(50); setConfirmDelete(false); setMode({ type: 'add' }); };
  const startEdit = (r) => { setName(r.name); setIcon(r.icon); setCost(r.cost); setConfirmDelete(false); setMode({ type: 'edit', id: r.id }); };
  const cancel = () => { setMode({ type: 'list' }); setConfirmDelete(false); };

  const save = () => {
    if (!name.trim()) return;
    if (mode.type === 'add') {
      setState(s => ({ ...s, rewards: [...s.rewards, { id: uid(), name: name.trim(), icon, cost: Number(cost) }] }));
    } else if (mode.type === 'edit') {
      setState(s => ({ ...s, rewards: s.rewards.map(r => r.id === mode.id ? { ...r, name: name.trim(), icon, cost: Number(cost) } : r) }));
    }
    cancel();
  };

  const deleteReward = () => {
    setState(s => ({ ...s, rewards: s.rewards.filter(r => r.id !== mode.id) }));
    cancel();
  };

  const renderForm = (isEdit) => (
    <div style={{ background: C.card, borderRadius: '18px', padding: '16px', marginBottom: '12px', boxShadow: `0 3px 0 ${C.border}` }}>
      <input value={name} onChange={e => setName(e.target.value)} placeholder="Reward name" style={{ width: '100%', padding: '10px 14px', borderRadius: '12px', border: `2px solid ${C.border}`, fontSize: '1rem', marginBottom: '10px', fontFamily: 'inherit', boxSizing: 'border-box' }} />
      <div style={{ display: 'flex', gap: '8px', marginBottom: '14px' }}>
        <input value={icon} onChange={e => setIcon(e.target.value)} placeholder="Icon" style={{ flex: 1, padding: '10px 14px', borderRadius: '12px', border: `2px solid ${C.border}`, fontSize: '1rem', fontFamily: 'inherit', boxSizing: 'border-box' }} />
        <input type="number" value={cost} onChange={e => setCost(e.target.value)} placeholder="Cost" style={{ flex: 1, padding: '10px 14px', borderRadius: '12px', border: `2px solid ${C.border}`, fontSize: '1rem', fontFamily: 'inherit', boxSizing: 'border-box' }} />
      </div>
      {isEdit && confirmDelete ? (
        <div style={{ background: '#FFE5E5', borderRadius: '12px', padding: '12px', textAlign: 'center' }}>
          <div style={{ fontWeight: 700, color: C.text, marginBottom: '10px', fontSize: '0.9rem' }}>Remove this reward?</div>
          <div style={{ display: 'flex', gap: '8px' }}>
            <button onClick={deleteReward} style={{ flex: 1, background: '#E04E6D', color: '#fff', border: 'none', padding: '10px', borderRadius: '12px', fontWeight: 800, cursor: 'pointer' }}>Yes, remove</button>
            <button onClick={() => setConfirmDelete(false)} style={{ flex: 1, background: '#EEE', border: 'none', padding: '10px', borderRadius: '12px', fontWeight: 700, cursor: 'pointer' }}>Keep</button>
          </div>
        </div>
      ) : (
        <div style={{ display: 'flex', gap: '8px' }}>
          <button onClick={save} style={{ flex: 1, background: C.primary, color: '#fff', border: 'none', padding: '12px', borderRadius: '14px', fontWeight: 800, cursor: 'pointer' }}>{isEdit ? 'Save' : 'Add reward'}</button>
          {isEdit && <button onClick={() => setConfirmDelete(true)} style={{ background: '#FFE5E5', color: '#E04E6D', border: 'none', padding: '12px 14px', borderRadius: '14px', fontWeight: 800, cursor: 'pointer' }}>Delete</button>}
          <button onClick={cancel} style={{ background: '#EEE', border: 'none', padding: '12px 14px', borderRadius: '14px', fontWeight: 700, cursor: 'pointer' }}>Cancel</button>
        </div>
      )}
    </div>
  );

  return (
    <div>
      {mode.type === 'edit' && renderForm(true)}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '8px', marginBottom: '12px' }}>
        {state.rewards.map(r => mode.type === 'edit' && mode.id === r.id ? null : (
          <button
            key={r.id}
            onClick={() => startEdit(r)}
            style={{ background: C.card, borderRadius: '14px', padding: '12px', textAlign: 'center', border: 'none', cursor: 'pointer', boxShadow: `0 2px 0 ${C.border}` }}
          >
            <div style={{ fontSize: '2rem' }}>{r.icon}</div>
            <div style={{ fontWeight: 700, color: C.text, fontSize: '0.9rem' }}>{r.name}</div>
            <div style={{ color: C.textSoft, fontSize: '0.8rem', fontWeight: 700 }}>{r.cost} ⭐</div>
          </button>
        ))}
      </div>
      {mode.type === 'add' ? (
        renderForm(false)
      ) : (
        <button onClick={startAdd} style={{ width: '100%', background: 'transparent', border: `3px dashed ${C.textSoft}`, borderRadius: '18px', padding: '16px', color: C.text, fontFamily: 'Fredoka, sans-serif', fontWeight: 700, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px' }}>
          <Plus size={20} /> Add reward
        </button>
      )}
    </div>
  );
}


function SettingsTab({ state, setState, onSignOut, userEmail }) {
  const toggleSound = () => setState(s => ({ ...s, settings: { ...s.settings, soundOn: !s.settings.soundOn } }));
  const changePin = () => {
    const newPin = prompt('New 4-digit parent PIN:', state.settings.pin);
    if (newPin && /^\d{4}$/.test(newPin)) {
      setState(s => ({ ...s, settings: { ...s.settings, pin: newPin } }));
      alert('PIN updated.');
    } else if (newPin != null) {
      alert('PIN must be exactly 4 digits.');
    }
  };
  const homeworkPts = state.settings.homeworkPointsPerPage ?? 5;
  const adjustHomework = (delta) => {
    setState(s => ({ ...s, settings: { ...s.settings, homeworkPointsPerPage: Math.max(1, Math.min(100, (s.settings.homeworkPointsPerPage ?? 5) + delta)) } }));
  };
  return (
    <div>
      <div style={{ background: C.card, borderRadius: '18px', padding: '16px', marginBottom: '12px', boxShadow: `0 3px 0 ${C.border}` }}>
        <div style={{ fontFamily: 'Fredoka, sans-serif', fontWeight: 700, color: C.text, fontSize: '1rem', marginBottom: '4px' }}>Signed in as</div>
        <div style={{ color: C.textSoft, fontWeight: 600, fontSize: '0.9rem', marginBottom: '12px', wordBreak: 'break-all' }}>{userEmail}</div>
        <button onClick={onSignOut} style={{ background: '#FFE5E5', color: '#E04E6D', border: 'none', padding: '10px 16px', borderRadius: '12px', fontWeight: 800, cursor: 'pointer' }}>
          Sign out
        </button>
      </div>

      <div style={{ background: C.card, borderRadius: '18px', padding: '16px', marginBottom: '12px', boxShadow: `0 3px 0 ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div>
          <div style={{ fontFamily: 'Fredoka, sans-serif', fontWeight: 700, color: C.text, fontSize: '1rem' }}>Sound effects</div>
          <div style={{ color: C.textSoft, fontWeight: 600, fontSize: '0.85rem' }}>Celebrations, chimes, wins</div>
        </div>
        <button onClick={toggleSound} style={{ background: state.settings.soundOn ? C.mint : '#EEE', border: 'none', padding: '8px 18px', borderRadius: '999px', fontWeight: 800, color: C.text, cursor: 'pointer', fontFamily: 'Fredoka, sans-serif' }}>
          {state.settings.soundOn ? 'On' : 'Off'}
        </button>
      </div>

      <div style={{ background: C.card, borderRadius: '18px', padding: '16px', marginBottom: '12px', boxShadow: `0 3px 0 ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '12px' }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontFamily: 'Fredoka, sans-serif', fontWeight: 700, color: C.text, fontSize: '1rem' }}>Homework points</div>
          <div style={{ color: C.textSoft, fontWeight: 600, fontSize: '0.85rem' }}>Per completed page</div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', flexShrink: 0 }}>
          <button onClick={() => adjustHomework(-1)} style={{ width: '36px', height: '36px', borderRadius: '50%', background: C.bgSoft, border: 'none', fontWeight: 800, fontSize: '1.2rem', color: C.text, cursor: 'pointer', fontFamily: 'Fredoka, sans-serif' }}>−</button>
          <div style={{ minWidth: '54px', textAlign: 'center', fontFamily: 'Fredoka, sans-serif', fontWeight: 700, fontSize: '1.2rem', color: C.text, background: C.sun, padding: '6px 10px', borderRadius: '999px' }}>
            {homeworkPts} ⭐
          </div>
          <button onClick={() => adjustHomework(1)} style={{ width: '36px', height: '36px', borderRadius: '50%', background: C.bgSoft, border: 'none', fontWeight: 800, fontSize: '1.2rem', color: C.text, cursor: 'pointer', fontFamily: 'Fredoka, sans-serif' }}>+</button>
        </div>
      </div>

      <div style={{ background: C.card, borderRadius: '18px', padding: '16px', boxShadow: `0 3px 0 ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div>
          <div style={{ fontFamily: 'Fredoka, sans-serif', fontWeight: 700, color: C.text, fontSize: '1rem' }}>Parent PIN</div>
          <div style={{ color: C.textSoft, fontWeight: 600, fontSize: '0.85rem' }}>Current: {state.settings.pin}</div>
        </div>
        <button onClick={changePin} style={{ background: C.sun, border: 'none', padding: '8px 18px', borderRadius: '999px', fontWeight: 800, color: C.text, cursor: 'pointer', fontFamily: 'Fredoka, sans-serif' }}>
          Change
        </button>
      </div>
    </div>
  );
}


// ============= AUTH WRAPPER =============
function LoginScreen({ onSubmit, error, loading, onReset, notice }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [mode, setMode] = useState('login');
  const submit = (e) => {
    e?.preventDefault?.();
    if (mode === 'reset') {
      if (email) onReset(email);
    } else if (email && password) {
      onSubmit(mode, email, password);
    }
  };
  const headerText = mode === 'login' ? 'Welcome back!' : mode === 'signup' ? 'Create your family account' : 'Reset your password';
  const buttonText = loading ? '...' : mode === 'login' ? 'Log in' : mode === 'signup' ? 'Create account' : 'Send reset email';
  return (
    <div style={{ maxWidth: '420px', margin: '0 auto', minHeight: '100vh', background: C.bg, padding: '24px', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
      <div style={{ textAlign: 'center', marginBottom: '32px' }}>
        <div style={{ fontSize: '4rem', marginBottom: '8px' }}>⭐</div>
        <h1 style={{ fontFamily: 'Fredoka, sans-serif', color: C.text, fontSize: '2rem', fontWeight: 700, margin: 0 }}>Star Squad</h1>
        <p style={{ color: C.textSoft, fontWeight: 600, marginTop: '4px' }}>{headerText}</p>
      </div>
      <div style={{ background: C.card, borderRadius: '24px', padding: '20px', boxShadow: `0 5px 0 ${C.border}` }}>
        <input value={email} onChange={e => setEmail(e.target.value)} type="email" placeholder="Email" autoCapitalize="none" autoCorrect="off" style={{ width: '100%', padding: '14px 16px', borderRadius: '14px', border: `2px solid ${C.border}`, fontSize: '1rem', marginBottom: '10px', fontFamily: 'inherit', boxSizing: 'border-box' }} />
        {mode !== 'reset' && (
          <input value={password} onChange={e => setPassword(e.target.value)} type="password" placeholder="Password" style={{ width: '100%', padding: '14px 16px', borderRadius: '14px', border: `2px solid ${C.border}`, fontSize: '1rem', marginBottom: '14px', fontFamily: 'inherit', boxSizing: 'border-box' }} />
        )}
        {mode === 'reset' && (
          <p style={{ color: C.textSoft, fontSize: '0.85rem', fontWeight: 600, marginBottom: '12px', marginTop: '4px' }}>We'll email you a link to reset your password.</p>
        )}
        {notice && <div style={{ background: '#E7F7ED', color: '#1F7A3A', padding: '10px 12px', borderRadius: '12px', fontSize: '0.85rem', fontWeight: 600, marginBottom: '12px' }}>{notice}</div>}
        {error && <div style={{ background: '#FFE5E5', color: '#C43355', padding: '10px 12px', borderRadius: '12px', fontSize: '0.85rem', fontWeight: 600, marginBottom: '12px' }}>{error}</div>}
        <button onClick={submit} disabled={loading} style={{ width: '100%', background: C.primary, color: '#fff', border: 'none', padding: '14px', borderRadius: '16px', fontWeight: 800, fontSize: '1.1rem', fontFamily: 'Fredoka, sans-serif', cursor: loading ? 'wait' : 'pointer', opacity: loading ? 0.6 : 1 }}>
          {buttonText}
        </button>
        {mode === 'login' && (
          <button onClick={() => setMode('reset')} style={{ width: '100%', background: 'transparent', border: 'none', color: C.textSoft, fontWeight: 700, padding: '10px', cursor: 'pointer', marginTop: '8px', fontSize: '0.9rem' }}>
            Forgot password?
          </button>
        )}
        <button onClick={() => setMode(mode === 'login' ? 'signup' : 'login')} style={{ width: '100%', background: 'transparent', border: 'none', color: C.textSoft, fontWeight: 700, padding: '12px', cursor: 'pointer', marginTop: '4px' }}>
          {mode === 'signup' ? "Have an account? Log in" : mode === 'reset' ? "Back to log in" : "New family? Create an account"}
        </button>
      </div>
      <p style={{ textAlign: 'center', color: C.textSoft, fontSize: '0.8rem', marginTop: '20px', fontWeight: 600 }}>Your data syncs across all your devices ✨</p>
    </div>
  );
}

function SetupScreen() {
  return (
    <div style={{ maxWidth: '520px', margin: '0 auto', minHeight: '100vh', padding: '24px', fontFamily: 'Nunito, sans-serif' }}>
      <h1 style={{ fontFamily: 'Fredoka, sans-serif', color: C.text }}>⚙️ One-time Firebase setup</h1>
      <p style={{ color: C.text, lineHeight: 1.6 }}>This app needs a free Firebase project to handle login and sync your data across devices. Here is what to do:</p>
      <ol style={{ color: C.text, lineHeight: 1.7 }}>
        <li>Go to <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a> and create a new project (free tier is fine).</li>
        <li>In the project, click the Web icon ({`</>`}) to register a Web app. Give it any nickname.</li>
        <li>Firebase shows you a <code>firebaseConfig</code> object. Copy its <strong>contents</strong>.</li>
        <li>In the Firebase sidebar: <strong>Build → Authentication → Get started → Email/Password → Enable → Save</strong>.</li>
        <li>In the Firebase sidebar: <strong>Build → Firestore Database → Create database → Start in production mode</strong>, pick a region (e.g. eur3).</li>
        <li>Go to <strong>Firestore → Rules</strong> and replace everything with:
          <pre style={{ background: '#FFE8D6', padding: '12px', borderRadius: '10px', overflow: 'auto', fontSize: '0.8rem' }}>{
`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /users/{userId} {
      allow read, write: if request.auth != null && request.auth.uid == userId;
    }
  }
}`
          }</pre>
          Click <strong>Publish</strong>.
        </li>
        <li>Now open <code>index.html</code> on your computer, find the line <code>const firebaseConfig = {`{`}</code>, and paste in the values from step 3.</li>
        <li>Re-upload index.html to your GitHub repo. Wait 1 minute. Reload the page. You will see the login screen.</li>
      </ol>
      <p style={{ color: C.textSoft, fontSize: '0.9rem', fontStyle: 'italic' }}>The whole setup takes about 10 minutes and is fully free for family-scale usage.</p>
    </div>
  );
}

function App() {
  if (!window.__FIREBASE_CONFIGURED__) return <SetupScreen />;

  const [firebaseUser, setFirebaseUser] = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [authError, setAuthError] = useState('');
  const [authNotice, setAuthNotice] = useState('');
  const [authLoading, setAuthLoading] = useState(false);

  useEffect(() => {
    const unsub = firebase.auth().onAuthStateChanged(u => {
      setFirebaseUser(u);
      setAuthReady(true);
    });
    return () => unsub();
  }, []);

  const handleAuth = async (mode, email, password) => {
    setAuthLoading(true); setAuthError(''); setAuthNotice('');
    try {
      if (mode === 'signup') {
        await firebase.auth().createUserWithEmailAndPassword(email, password);
      } else {
        await firebase.auth().signInWithEmailAndPassword(email, password);
      }
    } catch (e) {
      const msg = (e.code || '').replace('auth/', '').replace(/-/g, ' ') || e.message || 'Could not sign in';
      setAuthError(msg.charAt(0).toUpperCase() + msg.slice(1));
    }
    setAuthLoading(false);
  };

  const handleReset = async (email) => {
    setAuthLoading(true); setAuthError(''); setAuthNotice('');
    try {
      await firebase.auth().sendPasswordResetEmail(email);
      setAuthNotice('Check your email for a reset link! (Also check your spam folder.)');
    } catch (e) {
      const msg = (e.code || '').replace('auth/', '').replace(/-/g, ' ') || e.message || 'Could not send reset email';
      setAuthError(msg.charAt(0).toUpperCase() + msg.slice(1));
    }
    setAuthLoading(false);
  };

  const signOut = () => firebase.auth().signOut();

  if (!authReady) {
    return <div style={{ minHeight: '100vh', background: C.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.textSoft, fontWeight: 700 }}>Loading…</div>;
  }
  if (!firebaseUser) {
    return <LoginScreen onSubmit={handleAuth} onReset={handleReset} error={authError} notice={authNotice} loading={authLoading} />;
  }
  return <MainApp firebaseUser={firebaseUser} onSignOut={signOut} />;
}

// ============= TOP-LEVEL APP =============
function MainApp({ firebaseUser, onSignOut }) {
  const [state, setState] = useState(DEFAULT_STATE);
  const [loaded, setLoaded] = useState(false);
  const [screen, setScreen] = useState('launch'); // launch, kid, parentPin, parent
  const [kidScreen, setKidScreen] = useState('dashboard'); // dashboard, homework, store
  const [currentKidId, setCurrentKidId] = useState(null);
  const [confettiKey, setConfettiKey] = useState(null);

  // Load Google Fonts once
  useEffect(() => {
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap';
    document.head.appendChild(link);

    const style = document.createElement('style');
    style.textContent = `
      @keyframes confettiFly { 0% { transform: translate(0,0) rotate(0); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; } }
      @keyframes mascotIdle { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-10px) rotate(2deg); } }
      @keyframes mascotCheer { 0% { transform: scale(1) rotate(0); } 30% { transform: scale(1.35) rotate(-15deg); } 60% { transform: scale(1.25) rotate(15deg); } 100% { transform: scale(1) rotate(0); } }
      @keyframes bubblePop { 0% { transform: scale(0.3); opacity: 0; } 60% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
      @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
      body, button, input { font-family: 'Nunito', -apple-system, sans-serif; }
    `;
    document.head.appendChild(style);
    return () => { document.head.removeChild(link); document.head.removeChild(style); };
  }, []);

  // Load state from storage
  // Load from Firestore and subscribe to real-time updates
  useEffect(() => {
    if (!firebaseUser) return;
    const docRef = firebase.firestore().collection('users').doc(firebaseUser.uid);
    const unsub = docRef.onSnapshot(snap => {
      if (!snap.exists) {
        docRef.set({ state: DEFAULT_STATE });
      } else {
        const remote = snap.data().state;
        if (remote) {
          const migrated = migrateState(JSON.parse(JSON.stringify(remote)));
          setState(prev => JSON.stringify(prev) === JSON.stringify(migrated) ? prev : migrated);
        }
      }
      setLoaded(true);
    }, err => console.error('Firestore sync error:', err));
    return () => unsub();
  }, [firebaseUser]);

  // Save state on changes
  // Debounced save to Firestore on state changes
  useEffect(() => {
    if (!loaded || !firebaseUser) return;
    const handle = setTimeout(() => {
      firebase.firestore().collection('users').doc(firebaseUser.uid).set({ state })
        .catch(err => console.error('Firestore save error:', err));
    }, 800);
    return () => clearTimeout(handle);
  }, [state, loaded, firebaseUser]);

  const currentKid = state.kids.find(k => k.id === currentKidId);
  const homeworkPages = currentKid ? (state.homeworkPages[`${currentKidId}_${todayKey()}`] || 0) : 0;

  const completeTask = (task) => {
    if (!currentKid) return;
    const key = compKey(currentKid.id, task);
    const earned = (task.points || 0) + (task.bonus || 0);
    if (state.completions[key]) {
      // Already done — undo: remove completion, refund points
      setState(s => {
        const newCompletions = { ...s.completions };
        delete newCompletions[key];
        return {
          ...s,
          completions: newCompletions,
          kids: s.kids.map(k => k.id === currentKid.id ? {
            ...k,
            weeklyPoints: Math.max(0, k.weeklyPoints - earned),
            lifetimePoints: Math.max(0, k.lifetimePoints - earned),
          } : k),
        };
      });
      // No celebration / sound on undo — keep it quiet so it doesn't feel rewarding
    } else {
      setState(s => ({
        ...s,
        completions: { ...s.completions, [key]: true },
        kids: s.kids.map(k => k.id === currentKid.id ? { ...k, weeklyPoints: k.weeklyPoints + earned, lifetimePoints: k.lifetimePoints + earned } : k),
      }));
      setConfettiKey(Date.now() + '_medium');
      playSound('task', !state.settings.soundOn);
    }
  };

  const completeHomeworkPage = (newPages) => {
    if (!currentKid) return;
    const pointsPerPage = state.settings.homeworkPointsPerPage ?? 5;
    let bonusStickers = 0;
    if (newPages === 10 || (newPages > 10 && newPages % 10 === 0)) bonusStickers = 1;
    const soundName = (newPages % 10 === 0) ? 'milestone10' : (newPages % 5 === 0) ? 'milestone5' : 'page';
    playSound(soundName, !state.settings.soundOn);
    setState(s => ({
      ...s,
      homeworkPages: { ...s.homeworkPages, [`${currentKid.id}_${todayKey()}`]: newPages },
      kids: s.kids.map(k => k.id === currentKid.id ? {
        ...k,
        weeklyPoints: k.weeklyPoints + pointsPerPage,
        lifetimePoints: k.lifetimePoints + pointsPerPage,
        stickers: k.stickers + bonusStickers,
      } : k),
    }));
  };

  const redeem = (reward) => {
    if (!currentKid) return;
    if (currentKid.weeklyPoints < reward.cost) return;
    setState(s => ({
      ...s,
      kids: s.kids.map(k => k.id === currentKid.id ? { ...k, weeklyPoints: k.weeklyPoints - reward.cost } : k),
      redemptions: [...s.redemptions, { id: uid(), kidId: currentKid.id, rewardId: reward.id, status: 'pending', date: todayKey() }],
    }));
    playSound('redeem', !state.settings.soundOn);
  };

  if (!loaded) {
    return <div className="min-h-screen flex items-center justify-center" style={{ background: C.bg, color: C.textSoft, fontWeight: 700 }}>Loading…</div>;
  }

  return (
    <div style={{ maxWidth: '480px', margin: '0 auto', minHeight: '100vh', background: C.bg, position: 'relative' }}>
      <Confetti intensity={confettiKey?.split('_')[1] || 'medium'} trigger={confettiKey} />

      {screen === 'launch' && (
        <Launch
          kids={state.kids}
          onPickKid={id => { setCurrentKidId(id); setKidScreen('dashboard'); setScreen('kid'); }}
          onParent={() => setScreen('parentPin')}
        />
      )}

      {screen === 'parentPin' && (
        <ParentPin
          correctPin={state.settings.pin}
          onSuccess={() => setScreen('parent')}
          onBack={() => setScreen('launch')}
        />
      )}

      {screen === 'parent' && (
        <ParentView state={state} setState={setState} onBack={() => setScreen('launch')} onSignOut={onSignOut} userEmail={firebaseUser?.email} />
      )}

      {screen === 'kid' && currentKid && kidScreen === 'dashboard' && (
        <KidDashboard
          kid={currentKid}
          state={state}
          onComplete={completeTask}
          onHomework={() => setKidScreen('homework')}
          onStore={() => setKidScreen('store')}
          onBack={() => setScreen('launch')}
        />
      )}

      {screen === 'kid' && currentKid && kidScreen === 'homework' && (
        <HomeworkMode
          kid={currentKid}
          pages={homeworkPages}
          onPageDone={completeHomeworkPage}
          onBack={() => setKidScreen('dashboard')}
        />
      )}

      {screen === 'kid' && currentKid && kidScreen === 'store' && (
        <RewardStore
          kid={currentKid}
          state={state}
          onRedeem={redeem}
          onBack={() => setKidScreen('dashboard')}
        />
      )}
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
